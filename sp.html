<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>S&P 500 Danger 偵測工具</title>
    <style>
        :root {
            --bg:#0b1220; --card:#111b33; --text:#e8f0ff;
            --ok:#38d39f; --danger:#ff4d4d; --warn:#ffcc33; --muted:#9fb0d0;
            --border:#233052;
        }
        body { background:var(--bg); color:var(--text); font-family:sans-serif; padding:20px; }
        .card { background:var(--card); border-radius:12px; padding:20px; border:1px solid var(--border); max-width:1100px; margin:auto; }
        .controls { display:flex; gap:10px; margin-top:14px; flex-wrap:wrap; }
        input, select { padding:12px; background:#0b1220; color:white; border:1px solid var(--border); border-radius:8px; }
        input { flex:1; min-width:200px; }
        button { background:var(--ok); color:#0b1220; font-weight:bold; cursor:pointer; border:none; padding:12px 22px; border-radius:8px; }
        table { width:100%; margin-top:18px; border-collapse:collapse; }
        th, td { padding:12px; text-align:left; border-bottom:1px solid var(--border); font-size:13px; }
        .tag { padding:2px 8px; border-radius:999px; font-size:12px; font-weight:800; display:inline-block; color:#000; margin-right:4px;}
        .pill-danger { background: var(--danger); }
        .pill-med { background: var(--warn); }
        .pill-low { background: #6ea8ff; }
        #status { margin-top:10px; text-align:center; color:var(--warn); font-size:13px; }
    </style>
</head>
<body>
    <div class="card">
        <h2 style="margin-top:0;">🚀 S&P 500 Danger 偵測 (穩定版)</h2>
        <div class="controls">
            <input id="symbol" type="text" value="^GSPC" placeholder="例如 ^GSPC, TSLA" />
            <select id="range">
                <option value="1mo">最近 1 個月</option>
                <option value="3mo" selected>最近 3 個月</option>
                <option value="6mo">最近 6 個月</option>
                <option value="1y">最近 1 年</option>
            </select>
            <button type="button" onclick="fetchData()">執行偵測</button>
        </div>
        <div id="status">準備就緒</div>
    </div>

    <table>
        <thead>
            <tr>
                <th>日期</th>
                <th>收盤</th>
                <th>漲跌%</th>
                <th>成交量</th>
                <th>訊號</th>
                <th>風險</th>
            </tr>
        </thead>
        <tbody id="tbody"></tbody>
    </table>

<script>
    async function fetchData() {
        let sym = document.getElementById("symbol").value.trim().toUpperCase();
        if (sym === "SPX" || sym === "^SPX") sym = "^GSPC"; // 自動校正
        
        const range = document.getElementById("range").value;
        const status = document.getElementById("status");
        const tbody = document.getElementById("tbody");

        status.innerText = "⚡ 正在透過安全通道獲取 Yahoo 數據...";
        tbody.innerHTML = "";

        const yahooUrl = `https://query1.finance.yahoo.com/v7/finance/download/${encodeURIComponent(sym)}?range=${range}&interval=1d&events=history`;
        // 使用 AllOrigins 代理，它會將 CSV 內容包裝在 JSON 裡
        const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(yahooUrl)}`;

        try {
            const response = await fetch(proxyUrl);
            if (!response.ok) throw new Error("代理伺服器連線失敗");
            
            const json = await response.json();
            const csvData = json.contents; // 這是真正的 CSV 字串
            
            const lines = csvData.trim().split('\n');
            if (lines.length < 2) throw new Error("找不到該代號的數據");

            let results = [];
            for (let i = 1; i < lines.length; i++) {
                const prevCols = lines[i-1].split(',');
                const currCols = lines[i].split(',');
                
                const date = currCols[0];
                const close = parseFloat(currCols[4]);
                const prevClose = parseFloat(prevCols[4]);
                const vol = parseInt(currCols[6]);
                const prevVol = parseInt(prevCols[6]);

                if (isNaN(close) || isNaN(vol) || isNaN(prevClose)) continue;

                const change = ((close - prevClose) / prevClose) * 100;
                let signals = [];
                let score = 0;

                // 核心邏輯
                if (change < -0.2 && vol > prevVol) {
                    signals.push("Distribution");
                    score += 1;
                }
                if (change < -2.0) {
                    signals.push("Sudden Drop");
                    score += 2;
                }

                let label = { text: "Low", cls: "pill-low" };
                if (score >= 3) label = { text: "Danger", cls: "pill-danger" };
                else if (score >= 1) label = { text: "Medium", cls: "pill-med" };

                results.push({ date, close, change, vol, signals, label });
            }

            results.reverse(); // 最新日期在上
            tbody.innerHTML = results.map(r => `
                <tr>
                    <td>${r.date}</td>
                    <td>${r.close.toFixed(2)}</td>
                    <td style="color:${r.change < 0 ? 'var(--danger)' : 'var(--ok)'}">${r.change.toFixed(2)}%</td>
                    <td>${(r.vol / 1000000).toFixed(2)}M</td>
                    <td>${r.signals.map(s => `<span class="tag pill-med">${s}</span>`).join("")}</td>
                    <td><span class="tag ${r.label.cls}">${r.label.text}</span></td>
                </tr>
            `).join("");

            status.innerText = `✅ 完成！已分析過去 ${range} 的數據。`;

        } catch (e) {
            console.error(e);
            status.innerText = `❌ 錯誤：${e.message}。請確認代號正確 (如 ^GSPC)。`;
        }
    }
</script>
</body>
</html>
