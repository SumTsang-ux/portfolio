<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="utf-8">
    <title>S&P 500 出貨日偵測 - 安全穩定版</title>
    <style>
        :root { --bg: #0b1220; --card: #111b33; --text: #e8f0ff; --ok: #38d39f; --danger: #ff4d4d; --warn: #ffcc33; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; padding: 20px; }
        .card { background: var(--card); border-radius: 12px; padding: 25px; border: 1px solid #233052; max-width: 900px; margin: auto; }
        .controls { display: flex; gap: 10px; margin-top: 15px; }
        input { flex-grow: 1; padding: 12px; background: #0b1220; color: white; border: 1px solid #233052; border-radius: 8px; }
        button { background: var(--ok); color: #0b1220; font-weight: bold; cursor: pointer; border: none; padding: 12px 25px; border-radius: 8px; }
        table { width: 100%; margin-top: 25px; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #233052; font-size: 13px; }
        .tag { padding: 2px 6px; border-radius: 4px; font-size: 11px; font-weight: bold; color: #000; }
        #status { margin-top: 15px; font-size: 13px; color: var(--warn); text-align: center; }
    </style>
</head>
<body>

<div class="card">
    <h2 style="margin-top:0;">🛡️ 安全版偵測工具 (直接連線)</h2>
    <p style="font-size: 13px; color: #9fb0d0;">使用 JSONP 技術直接連線 Stooq，不經過任何第三方代理服務。</p>
    
    <div class="controls">
        <input type="text" id="symbol" value="^SPX" placeholder="輸入代號 (如 ^SPX, SPY.US, TSLA.US)">
        <button onclick="loadData()">分析數據</button>
    </div>
    <div id="status">準備就緒</div>
</div>

<table>
    <thead>
        <tr><th>日期</th><th>收盤價</th><th>漲跌幅</th><th>成交量</th><th>訊號判定</th></tr>
    </thead>
    <tbody id="tbody"></tbody>
</table>

<script>
    // 這是處理 Stooq 回傳數據的函數
    function handleStooqData(json) {
        const status = document.getElementById('status');
        const tbody = document.getElementById('tbody');
        
        if (!json || json.length < 2) {
            status.innerText = "❌ 找不到數據，請確認代號是否正確。";
            return;
        }

        let html = "";
        let distCount = 0;
        
        // Stooq 的數據通常是從舊到新，我們倒過來顯示
        const data = json.reverse();

        for (let i = 0; i < Math.min(data.length - 1, 40); i++) {
            const current = data[i];
            const prev = data[i+1];

            const date = current[0]; // Date
            const close = parseFloat(current[4]); // Close
            const prevClose = parseFloat(prev[4]);
            const vol = parseInt(current[5]); // Volume
            const prevVol = parseInt(prev[5]);

            if (isNaN(close) || isNaN(vol)) continue;

            const change = ((close - prevClose) / prevClose) * 100;
            let signal = "";
            
            if (change < -0.2 && vol > prevVol) {
                signal = '<span class="tag" style="background:var(--warn)">出貨日</span>';
                distCount++;
            }

            html += `<tr>
                <td>${date}</td>
                <td>${close.toFixed(2)}</td>
                <td style="color:${change < 0 ? 'var(--danger)' : 'var(--ok)'}">${change.toFixed(2)}%</td>
                <td>${(vol/1000000).toFixed(2)}M</td>
                <td>${signal}</td>
            </tr>`;
        }

        tbody.innerHTML = html;
        status.innerText = `✅ 分析完成！共偵測到 ${distCount} 個訊號。`;
        
        // 移除暫時建立的 script 標籤
        const oldScript = document.getElementById('stooq-script');
        if (oldScript) oldScript.remove();
    }

    function loadData() {
        const sym = document.getElementById('symbol').value.toLowerCase();
        const status = document.getElementById('status');
        status.innerText = "⚡ 正在連線到 Stooq...";

        // 建立 JSONP 請求
        const script = document.createElement('script');
        script.id = 'stooq-script';
        // 使用 Stooq 的 JSON 導出格式，並指定回呼函數為 handleStooqData
        script.src = `https://stooq.com/q/d/l/?s=${sym}&i=d&f=sd2ohclv&p=1&c=handleStooqData`;
        
        script.onerror = () => {
            status.innerText = "❌ 連線失敗。請確認代號 (如 ^SPX) 是否正確。";
        };

        document.body.appendChild(script);
    }
</script>
</body>
</html>
