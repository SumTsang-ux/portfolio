<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="utf-8">
    <title>S&P 500 出貨日偵測 - 穩定終極版</title>
    <style>
        :root { --bg: #0b1220; --card: #111b33; --text: #e8f0ff; --ok: #38d39f; --danger: #ff4d4d; --warn: #ffcc33; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; padding: 20px; }
        .card { background: var(--card); border-radius: 12px; padding: 25px; border: 1px solid #233052; max-width: 600px; margin: auto; text-align: center; }
        .controls { display: flex; flex-direction: column; gap: 15px; margin-top: 20px; }
        input { padding: 15px; background: #0b1220; color: white; border: 1px solid #233052; border-radius: 8px; font-size: 16px; text-align: center; }
        button { background: var(--ok); color: #0b1220; font-weight: bold; cursor: pointer; border: none; padding: 15px; border-radius: 8px; font-size: 16px; }
        .tip { font-size: 12px; color: #9fb0d0; margin-top: 10px; }
    </style>
</head>
<body>

<div class="card">
    <h2 style="margin-top:0;">🚀 出貨日分析 (GitHub 專用版)</h2>
    <p>因為瀏覽器安全限制，我們改用直接抓取模式。</p>
    
    <div class="controls">
        <input type="text" id="symbol" value="^SPX" placeholder="輸入代號 (如 ^SPX, SPY.US)">
        <button onclick="downloadAndAnalyze()">開始獲取數據</button>
    </div>
    
    <p class="tip">點擊後會直接連線到數據源</p>
    <div id="status" style="margin-top:20px; color:var(--warn)"></div>
</div>

<script>
    function downloadAndAnalyze() {
        const sym = document.getElementById('symbol').value.toLowerCase().trim();
        const status = document.getElementById('status');
        
        status.innerText = "⚡ 正在準備數據，請稍候...";
        
        // 這是 Stooq 官方的 CSV 下載網址
        // 直接讓瀏覽器導向這個網址，避開所有 CORS 攔截
        const downloadUrl = `https://stooq.com/q/d/l/?s=${sym}&i=d&f=sd2ohclv&p=1`;
        
        // 為了不讓你離開現在的網頁，我們用在新分頁開啟的方式
        window.open(downloadUrl, '_blank');
        
        status.innerHTML = `
            <div style="text-align:left; background:#0b1220; padding:15px; border-radius:8px; margin-top:10px;">
                <p style="color:var(--ok)">✅ 已開啟數據下載窗口！</p>
                <p style="font-size:13px; color:#e8f0ff;">Stooq 會下載一個 CSV 檔案。你可以：</p>
                <ol style="font-size:13px; color:#e8f0ff;">
                    <li>打開該檔案。</li>
                    <li>檢查 <b>Volume (成交量)</b> 是否大於前一日。</li>
                    <li>檢查 <b>Close (收盤)</b> 跌幅是否超過 0.2%。</li>
                </ol>
            </div>`;
    }
</script>
</body>
</html>
