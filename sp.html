<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="utf-8">
    <title>S&P 500 出貨日偵測 - API 版</title>
    <style>
        :root { --bg: #0b1220; --card: #111b33; --text: #e8f0ff; --ok: #38d39f; --danger: #ff4d4d; --warn: #ffcc33; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; padding: 20px; }
        .card { background: var(--card); border-radius: 12px; padding: 25px; border: 1px solid #233052; max-width: 900px; margin: auto; }
        .controls { display: flex; gap: 10px; margin-top: 15px; flex-wrap: wrap; }
        input { flex-grow: 1; padding: 12px; background: #0b1220; color: white; border: 1px solid #233052; border-radius: 8px; min-width: 200px; }
        button { background: var(--ok); color: #0b1220; font-weight: bold; cursor: pointer; border: none; padding: 12px 25px; border-radius: 8px; }
        table { width: 100%; margin-top: 25px; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #233052; font-size: 13px; }
        .tag { padding: 2px 6px; border-radius: 4px; font-size: 11px; font-weight: bold; color: #000; }
        #status { margin-top: 15px; font-size: 13px; color: var(--warn); text-align: center; }
    </style>
</head>
<body>

<div class="card">
    <h2 style="margin-top:0;">🚀 出貨日偵測 (API 認證版)</h2>
    <div class="controls">
        <input type="text" id="symbol" value="^SPX" placeholder="指數代號">
        <input type="text" id="apikey" placeholder="在此貼上你的 Stooq API Key">
        <button onclick="fetchWithKey()">執行分析</button>
    </div>
    <div id="status">請輸入從 Stooq 取得的 API Key。</div>
</div>

<table>
    <thead>
        <tr><th>日期</th><th>收盤價</th><th>漲跌幅</th><th>成交量</th><th>訊號判定</th></tr>
    </thead>
    <tbody id="tbody"></tbody>
</table>

<script>
    async function fetchWithKey() {
        const sym = document.getElementById('symbol').value.trim();
        const key = document.getElementById('apikey').value.trim();
        const status = document.getElementById('status');
        const tbody = document.getElementById('tbody');

        if (!key) {
            status.innerText = "❌ 錯誤：請先輸入 API Key。";
            return;
        }

        status.innerText = "⚡ 正在連線獲取數據...";
        tbody.innerHTML = "";

        // 使用 AllOrigins Proxy 繞過跨域限制，並帶上你取得的 API Key
        const target = `https://stooq.com/q/d/l/?s=${sym}&i=d&f=sd2ohclv&p=1&apikey=${key}`;
        const url = `https://api.allorigins.win/get?url=${encodeURIComponent(target)}`;

        try {
            const resp = await fetch(url);
            const json = await resp.json();
            const csvText = json.contents;

            if (csvText.includes("Invalid API Key") || csvText.length < 50) {
                throw new Error("API Key 無效或已過期");
            }

            const lines = csvText.trim().split('\n');
            const data = lines.slice(1);
            let html = "";
            let distCount = 0;

            // 從最新數據往前分析
            for (let i = data.length - 1; i > 0; i--) {
                const current = data[i].split(',');
                const prev = data[i-1].split(',');

                const date = current[0];
                const close = parseFloat(current[4]);
                const prevClose = parseFloat(prev[4]);
                const vol = parseInt(current[5]);
                const prevVol = parseInt(prev[5]);
                
                if (isNaN(close) || isNaN(vol)) continue;

                const change = ((close - prevClose) / prevClose) * 100;
                let signal = "";
                
                if (change < -0.2 && vol > prevVol) {
                    signal = '<span class="tag" style="background:var(--warn)">出貨日</span>';
                    distCount++;
                }

                html += `<tr>
                    <td>${date}</td>
                    <td>${close.toFixed(2)}</td>
                    <td style="color:${change < 0 ? 'var(--danger)' : 'var(--ok)'}">${change.toFixed(2)}%</td>
                    <td>${(vol/1000000).toFixed(2)}M</td>
                    <td>${signal}</td>
                </tr>`;
            }

            tbody.innerHTML = html;
            status.innerText = `✅ 分析完成！偵測到 ${distCount} 次出貨訊號。`;

        } catch (e) {
            status.innerText = `❌ 錯誤：${e.message}`;
            console.error(e);
        }
    }
</script>
</body>
</html>
